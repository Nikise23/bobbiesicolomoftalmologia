# Configuración de deploy en Render (Static Site).
# Si creaste el servicio manualmente, verificá en el dashboard que coincida:
#   Build Command: npm install && npm run build
#   Publish Directory: dist

services:
  - type: web
    name: bobbiesicolomoftalmologia
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "22"
    headers:
      # Evita que el navegador cachee index.html con hashes viejos de assets
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # Assets con hash: cache largo (son inmutables)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA: rutas como /turnos, /contacto → index.html (solo si el archivo no existe)
      - type: rewrite
        source: /*
        destination: /index.html
